# Static server for the prerendered Astro site (the `public-web` service). Owns caching + clean URLs.

# JSON access logs (one object per line) so the log pipeline (Alloy -> Loki) can columnise them in Grafana
# with `| json`, the same shape the club-portal services emit. client_ip is X-Forwarded-For (the real
# client, set by the Cloudflare Tunnel / any upstream proxy); remote_addr is just the immediate peer.
log_format json_access escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"client_ip":"$http_x_forwarded_for",'
      '"method":"$request_method",'
      '"path":"$request_uri",'
      '"status":$status,'
      '"bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"referer":"$http_referer",'
      '"user_agent":"$http_user_agent"'
    '}';

server {
    access_log /var/log/nginx/access.log json_access;

    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Compress text assets (the JS/CSS bundle dominates payload). Hashed images are already small/binary.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types application/javascript application/json image/svg+xml text/css text/plain;

    # Astro content-hashed build assets (filename changes on every content change) → cache forever.
    location /_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Clean URLs for the prerendered multipage site: /about -> /about/index.html. HTML is never cached so a
    # redeploy is visible immediately (nginx does not inherit add_header into a block that sets its own,
    # so the header is repeated here rather than at server level).
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/index.html $uri.html =404;
    }
}
